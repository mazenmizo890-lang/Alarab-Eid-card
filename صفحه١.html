<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Alarab Eid Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#f5f9ff;}

/* عيدكم مبارك */
.header-left{
position:absolute;top:20px;left:20px;
font-size:32px;color:#0a58ca;
font-family:'Reem Kufi',sans-serif;
}

/* اللوجو */
.logo{position:absolute;top:20px;right:20px;}
.logo img{width:80px;}

/* رسالة toast */
.toast{
position:fixed;top:20px;left:-300px;
background:#0a58ca;color:#fff;
padding:15px 25px;border-radius:10px;
transition:0.5s;
}
.toast.show{left:20px;}

/* زرار استلام الصورة */
#receiveBtn{
position:fixed;top:70px;left:-300px;
padding:12px 25px;
background:#0a58ca;color:#fff;
border:none;border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.5s;
}
#receiveBtn.show{left:20px;}

/* الكونتينر */
.container{display:flex;justify-content:space-between;align-items:center;height:100vh;padding:50px;}

/* الفورم */
.form{width:45%;background:#fff;padding:30px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px;}

.btn{
width:100%;padding:15px;background:#0a58ca;color:#fff;
border:none;border-radius:10px;font-size:18px;cursor:pointer;
transition:0.3s;
}
.btn:hover{background:#084298;transform:scale(1.05);}

/* الكارت */
.card{
width:45%;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
background:#fff;
}

/* الصورة */
.card img{
width:100%;
height:300px;
object-fit:cover;
}

/* الشريط الأزرق */
.footer{
height:90px;
background:#0a58ca;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:20px;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<div class="header-left">عيدكم مبارك</div>

<div class="logo">
<img src="a.jpg">
</div>

<div class="toast" id="toast">✅ تم التحميل</div>
<button id="receiveBtn" onclick="downloadImage()">استلام الصورة</button>

<div class="container">

<div class="form">
<input type="text" id="name" placeholder="ادخل اسمك">
<input type="text" id="msg" placeholder="اكتب التهنئة">

<button class="btn" onclick="generate()">تحميل الآن</button>
</div>

<div class="card" id="card">
<img src="b.jpg">

<!-- تم حذف النص الذي كان فوق الصورة -->

<div class="footer" id="result">
اكتب اسمك والتهنئة تظهر هنا
</div>

</div>

</div>

<script>
function generate(){
let name=document.getElementById("name").value;
let msg=document.getElementById("msg").value;

if(name==""||msg==""){
alert("اكتب البيانات");
return;
}

/* عرض النص في الشريط الأزرق */
document.getElementById("result").innerHTML=name+" - "+msg;

/* اظهار toast وزرار استلام الصورة */
let toast=document.getElementById("toast");
toast.classList.add("show");
let btn=document.getElementById("receiveBtn");
btn.classList.add("show");

/* اخفاء toast بعد 3 ثواني */
setTimeout(()=>{toast.classList.remove("show");},3000);
}

/* تحميل الصورة */
function downloadImage(){
html2canvas(document.getElementById("card")).then(canvas=>{
let link=document.createElement("a");
link.download="eid-card.png";
link.href=canvas.toDataURL();
link.click();
});
}
</script>

</body>
</html>
